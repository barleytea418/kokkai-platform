name: Auto Improve

on:
  schedule:
    - cron: '0 2 * * 1' # 月曜 02:00 UTC（毎週）
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: ESLint + Prettier 自動修正
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prettier
        run: npm run format

      - name: ESLint auto-fix
        run: npm run lint:fix
        continue-on-error: true

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-improve/${{ github.run_number }}
          title: 'chore: 自動フォーマット修正 #${{ github.run_number }}'
          body: |
            ## 自動修正内容

            - Prettier によるコードフォーマット
            - ESLint による自動修正

            *毎週月曜に自動実行されます*
          labels: auto-improve
          commit-message: 'chore: Prettier + ESLint 自動修正'
