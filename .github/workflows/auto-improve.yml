name: Auto Improve

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # 月曜 02:00 UTC（毎週）
  workflow_dispatch:
    inputs:
      target:
        description: 'レビュー対象 (all / diff)'
        required: false
        default: diff

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-review:
    name: Claude AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Run Claude Review
        id: review
        run: node .github/scripts/claude-review.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ github.event.inputs.target || 'diff' }}

      - name: Apply Safe Auto-fixes
        if: steps.review.outputs.has_fixes == 'true'
        run: node .github/scripts/apply-fixes.js
        env:
          FIXES_JSON: ${{ steps.review.outputs.fixes_json }}

      - name: Create PR
        if: steps.review.outputs.has_fixes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-improve/${{ github.run_number }}
          title: '🤖 自動改善提案 #${{ github.run_number }}'
          body: ${{ steps.review.outputs.pr_body }}
          labels: auto-improve, claude-ai
          commit-message: 'chore: Claude AI による自動改善'
